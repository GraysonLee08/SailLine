<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SailLine — Wireframes</title>
<link rel="stylesheet" href="styles.css" />

<script type="application/json" id="speaker-notes">[]</script>
</head>
<body data-density="normal" data-annotations="on">

<deck-stage>

  <section class="slide" data-screen-label="00 Cover">
    <div class="slide-chrome"></div>
    <div id="cover"></div>
  </section>

  <!-- MARKETING — variants -->
  <section class="slide" data-screen-label="01 Marketing">
    <div class="slide-meta">
      <div class="lhs"><span class="num">MKT-01</span><span>—</span><span class="title">Marketing site · 3 variants</span></div>
      <div class="rhs">SAILLINE · WIREFRAME · v1</div>
    </div>
    <div class="slide-body" id="mkt-variants"></div>
    <div class="slide-foot"><div>USE TABS ↑ TO SWITCH</div><div>VARIANT A · DENSE GRID  ·  B · STRIPE/LINEAR  ·  C · CINEMATIC</div></div>
  </section>

  <section class="slide" data-screen-label="02 Marketing Hardware">
    <div id="mkt-hardware"></div>
  </section>

  <!-- ONBOARDING — separate screens (one per slide for clarity) -->
  <section class="slide" data-screen-label="03 Onboarding Account">
    <div id="onb-a"></div>
  </section>
  <section class="slide" data-screen-label="04 Onboarding Boat">
    <div id="onb-b"></div>
  </section>
  <section class="slide" data-screen-label="05 Onboarding Tier">
    <div id="onb-c"></div>
  </section>

  <!-- PRE-RACE — variants -->
  <section class="slide" data-screen-label="06 Pre-race A">
    <div id="pre-a"></div>
  </section>
  <section class="slide" data-screen-label="07 Pre-race B">
    <div id="pre-b"></div>
  </section>
  <section class="slide" data-screen-label="08 Pre-race C">
    <div id="pre-c"></div>
  </section>

  <!-- IN-RACE — 4 variants of AI advisor -->
  <section class="slide" data-screen-label="09 In-race · Card">
    <div id="race-a" style="position:absolute;inset:0;"></div>
  </section>
  <section class="slide" data-screen-label="10 In-race · Thread">
    <div id="race-b" style="position:absolute;inset:0;"></div>
  </section>
  <section class="slide" data-screen-label="11 In-race · Ticker">
    <div id="race-c" style="position:absolute;inset:0;"></div>
  </section>
  <section class="slide" data-screen-label="12 In-race · Map-anchored">
    <div id="race-d" style="position:absolute;inset:0;"></div>
  </section>

  <!-- POST-RACE -->
  <section class="slide" data-screen-label="13 Post-race A">
    <div id="post-a"></div>
  </section>
  <section class="slide" data-screen-label="14 Post-race B">
    <div id="post-b"></div>
  </section>
  <section class="slide" data-screen-label="15 Post-race C">
    <div id="post-c"></div>
  </section>

  <!-- SETTINGS -->
  <section class="slide" data-screen-label="16 Settings · Boat">
    <div id="set-a"></div>
  </section>
  <section class="slide" data-screen-label="17 Settings · Telemetry">
    <div id="set-b"></div>
  </section>

  <!-- COCKPIT -->
  <section class="slide" data-screen-label="18 Cockpit / Tablet">
    <div id="cockpit"></div>
  </section>

</deck-stage>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="deck-stage.js"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="slides-marketing.jsx"></script>
<script type="text/babel" src="slides-onboarding.jsx"></script>
<script type="text/babel" src="slides-race.jsx"></script>
<script type="text/babel" src="slides-rest.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// Tweaks defaults
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "normal",
  "annotations": true,
  "darkPaper": false
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    document.body.setAttribute('data-density', tweaks.density);
    document.body.setAttribute('data-annotations', tweaks.annotations ? 'on' : 'off');
    if (tweaks.darkPaper) {
      document.documentElement.style.setProperty('--paper', '#1a1a1d');
      document.documentElement.style.setProperty('--paper-2', '#222226');
      document.documentElement.style.setProperty('--ink', '#f3f2ec');
      document.documentElement.style.setProperty('--ink-2', '#dcdcd6');
      document.documentElement.style.setProperty('--ink-3', '#a8a8a0');
      document.documentElement.style.setProperty('--ink-4', '#7a7a72');
      document.documentElement.style.setProperty('--rule', '#3a3a40');
      document.documentElement.style.setProperty('--rule-2', '#54545a');
      document.documentElement.style.setProperty('--hair', '#2c2c30');
    } else {
      document.documentElement.style.removeProperty('--paper');
      document.documentElement.style.removeProperty('--paper-2');
      document.documentElement.style.removeProperty('--ink');
      document.documentElement.style.removeProperty('--ink-2');
      document.documentElement.style.removeProperty('--ink-3');
      document.documentElement.style.removeProperty('--ink-4');
      document.documentElement.style.removeProperty('--rule');
      document.documentElement.style.removeProperty('--rule-2');
      document.documentElement.style.removeProperty('--hair');
    }
  }, [tweaks]);

  return (
    <window.TweaksPanel title="Tweaks">
      <window.TweakSection title="Display">
        <window.TweakRadio
          label="Density"
          value={tweaks.density}
          onChange={(v) => setTweak('density', v)}
          options={[{label:'Sparse',value:'sparse'},{label:'Normal',value:'normal'},{label:'Dense',value:'dense'}]}
        />
        <window.TweakToggle
          label="Annotations"
          value={tweaks.annotations}
          onChange={(v) => setTweak('annotations', v)}
        />
        <window.TweakToggle
          label="Dark paper"
          value={tweaks.darkPaper}
          onChange={(v) => setTweak('darkPaper', v)}
        />
      </window.TweakSection>
      <window.TweakSection title="Tip">
        <div style={{ fontSize: 12, color: '#888', lineHeight: 1.5 }}>
          Use ← / → to navigate. Some slides have variant tabs at the top — click to switch direction.
        </div>
      </window.TweakSection>
    </window.TweaksPanel>
  );
};

ReactDOM.createRoot(document.createElement('div').appendChild(Object.assign(document.body.appendChild(document.createElement('div')), {id:'__tweaks-root'}))).render(<App />);

// Render slides
const mount = (id, el) => {
  const node = document.getElementById(id);
  if (node) ReactDOM.createRoot(node).render(el);
};

mount('cover', <window.SlideCover />);

mount('mkt-variants',
  <window.Variants id="mkt" options={['A · Dense grid','B · Stripe/Linear','C · Cinematic']}>
    <window.MktA />
    <window.MktB />
    <window.MktC />
  </window.Variants>
);

mount('mkt-hardware', <window.SlideHardware />);

mount('onb-a', <window.OnbA />);
mount('onb-b', <window.OnbB />);
mount('onb-c', <window.OnbC />);

mount('pre-a', <window.PreA />);
mount('pre-b', <window.PreB />);
mount('pre-c', <window.PreC />);

mount('race-a', <window.RaceA />);
mount('race-b', <window.RaceB />);
mount('race-c', <window.RaceC />);
mount('race-d', <window.RaceD />);

mount('post-a', <window.PostA />);
mount('post-b', <window.PostB />);
mount('post-c', <window.PostC />);

mount('set-a', <window.SetA />);
mount('set-b', <window.SetB />);

mount('cockpit', <window.Cockpit />);
</script>
</body>
</html>
