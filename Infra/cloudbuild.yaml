# infra/cloudbuild.yaml
steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/sailline/api:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/sailline/api:latest'
      - './backend'

  # 2. Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-sha'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/sailline/api:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-latest'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/sailline/api:latest'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sailline-api'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/sailline/api:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--service-account=sailline-api@$PROJECT_ID.iam.gserviceaccount.com'
      - '--vpc-connector=sailline-connector'
      - '--vpc-egress=private-ranges-only'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,DB_NAME=sailline_app,DB_USER=sailline,DB_HOST=10.69.0.3,REDIS_HOST=10.69.1.3,REDIS_PORT=6379,GCS_WEATHER_BUCKET=sailline-weather'

# Run as the dedicated build service account
serviceAccount: 'projects/$PROJECT_ID/serviceAccounts/sailline-cloudbuild@$PROJECT_ID.iam.gserviceaccount.com'

# Logs to Cloud Logging only (avoids Cloud Storage requirement)
options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/sailline/api:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/sailline/api:latest'

timeout: 1200s