[pytest]
# Adds backend/ to sys.path so `pytest` works without the `python -m`
# prefix from the backend/ directory. Without this, `from app.foo import ...`
# in tests fails at collection time with ModuleNotFoundError.
pythonpath = .

markers =
    slow: tests that hit real network or take noticeable time (e.g. live NOAA)

# Silences the pytest-asyncio deprecation warning seen in test runs.
asyncio_default_fixture_loop_scope = function
