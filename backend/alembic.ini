# Alembic configuration for SailLine.
#
# All migrations live under `migrations/versions/`. The DB URL is built from
# environment variables in env.py — keep `sqlalchemy.url` blank here so we
# never accidentally commit a connection string.
#
# Run from `backend/`:
#     alembic upgrade head                      # apply all pending migrations
#     alembic revision -m "add_track_points"    # create a new migration file
#     alembic stamp head                        # mark DB as already at HEAD
#     alembic upgrade head --sql                # preview SQL without applying
#     alembic current                           # show current DB revision

[alembic]
script_location = migrations

# Filenames look like 0001_baseline.py, 0002_add_track_points.py, ...
# `%%` is ConfigParser-escaped `%`.
file_template = %%(rev)s_%%(slug)s

# Allow `from app.* import ...` inside migration files if ever needed.
# Requires that `alembic` is run from the `backend/` directory.
prepend_sys_path = .

# Built dynamically in env.py from DB_USER / DB_PASSWORD / DB_NAME / DB_HOST.
sqlalchemy.url =


# === Logging ===

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
